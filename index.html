<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>天天樂＋539 雙欄分析機-十七製作©</title>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#2a0202;
      --panel:#4b0b0b;
      --panel2:#5a1010;
      --gold:#f7d77b;
      --gold2:#d7a84a;
      --line:#7a1a1a;
      --txt:#fff3d0;
      --muted:#ffdca3b3;
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:16px;
      --ok:#7ed957;
      --warn:#ffb347;
      --danger:#ff6a6a;
      --info:#78c8ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 10%, #6c0e0e 0%, transparent 60%),
        radial-gradient(900px 500px at 80% 20%, #8c1b1b 0%, transparent 55%),
        linear-gradient(180deg, #1b0101 0%, var(--bg) 100%);
      color:var(--txt);
      min-height:100vh;
      padding:14px;
    }
    .wrap{max-width:1680px;margin:0 auto}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px;
      border:1px solid rgba(247,215,123,.25);
      background:linear-gradient(180deg, rgba(90,16,16,.92), rgba(50,6,6,.88));
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      gap:12px;
      margin-bottom:16px;
    }
    .brand{
      display:flex; align-items:center; gap:12px; min-width:240px;
    }
    .logoBox{
      width:86px;height:86px;border-radius:14px;
      background:radial-gradient(circle at 30% 30%, #ffe7a8 0%, #f7d77b 30%, #a56a12 100%);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.25), 0 10px 22px rgba(0,0,0,.35);
      overflow:hidden; flex:0 0 auto;
    }
    .logoBox img{width:100%;height:100%;object-fit:cover;display:block;}
    .brand h1{font-size:20px;margin:0;letter-spacing:.5px}
    .brand p{margin:2px 0 0; font-size:12px; color:var(--muted)}
    .righttools{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;
    }
    .pill{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(247,215,123,.22);
      background:rgba(0,0,0,.18);
      font-size:12px;
      color:var(--muted);
    }

    .twoCols{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
      align-items:start;
    }
    @media (max-width:1200px){
      .twoCols{grid-template-columns:1fr}
    }

    .lotteryWrap{
      display:flex;
      flex-direction:column;
      gap:14px;
      min-width:0;
    }

    .card{
      border-radius:var(--radius);
      border:1px solid rgba(247,215,123,.20);
      background:linear-gradient(180deg, rgba(90,16,16,.86), rgba(60,10,10,.88));
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid rgba(247,215,123,.15);
      background:linear-gradient(180deg, rgba(120,25,25,.55), rgba(0,0,0,0));
    }
    .hd .title{
      display:flex; align-items:center; gap:10px;
      font-weight:800; letter-spacing:.4px; color:#ffe7a8;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #fff 0%, var(--gold) 25%, #b97a1b 100%);
      box-shadow:0 0 0 3px rgba(247,215,123,.12);
    }
    .card .bd{padding:12px 14px}

    textarea, input, select{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(247,215,123,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:10px 12px;
      outline:none;
    }
    textarea{
      min-height:160px;
      resize:vertical;
      line-height:1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    @media (max-width:700px){ .row{grid-template-columns:1fr} }

    .btns{
      display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;
    }
    button{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      color:#2b1200;
      background:linear-gradient(180deg, #ffe7a8, var(--gold2));
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
    }
    button.secondary{
      color:var(--txt);
      background:rgba(0,0,0,.18);
      border:1px solid rgba(247,215,123,.22);
      box-shadow:none;
    }
    button.danger{
      color:#ffecec;
      background:linear-gradient(180deg, #ff6a6a, #b11414);
    }
    button.green{
      color:#173300;
      background:linear-gradient(180deg, #dfffbf, #7ed957);
    }

    .manualPickerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999;backdrop-filter:blur(2px)}
    .manualPickerOverlay.show{display:flex}
    .manualPickerCard{width:min(720px,100%);max-height:min(88vh,860px);overflow:auto;border-radius:20px;border:1px solid rgba(247,215,123,.24);background:linear-gradient(180deg, rgba(90,16,16,.98), rgba(36,6,6,.97));box-shadow:var(--shadow);padding:18px}
    .manualPickerGrid{margin-top:14px;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .manualPickerNum{border-radius:12px;padding:12px 8px;font-weight:900;color:var(--txt);background:rgba(0,0,0,.18);border:1px solid rgba(247,215,123,.18);box-shadow:none}
    .manualPickerNum.active{color:#173300;background:linear-gradient(180deg, #dfffbf, #7ed957)}
    @media (max-width:640px){.manualPickerGrid{grid-template-columns:repeat(4,minmax(0,1fr))}.manualPickerCard{padding:14px}}

    .small{font-size:12px;color:var(--muted)}
    .muted{color:var(--muted)}

    .statusLine{
      margin-top:8px;
      font-size:12px;
      color:#ffdba6;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .statusTag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(247,215,123,.18);
      background:rgba(0,0,0,.18);
      color:#ffe7a8;
      font-size:12px;
      font-weight:700;
    }
    .statusTag.ok{color:#dfffbf;border-color:rgba(126,217,87,.35)}
    .statusTag.warn{color:#ffe5b6;border-color:rgba(255,179,71,.35)}
    .statusTag.info{color:#cfeaff;border-color:rgba(120,200,255,.35)}

    .stats{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top:10px;
    }
    .stat{
      flex:1 1 130px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(247,215,123,.15);
      background:rgba(0,0,0,.14);
    }
    .stat b{display:block; font-size:12px; color:var(--muted); margin-bottom:4px}
    .stat span{font-size:18px; color:#ffe7a8; font-weight:800}

    .analysisWrap{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width:700px){
      .analysisWrap{grid-template-columns:1fr}
    }

    .analysisPanel{
      border:1px solid rgba(247,215,123,.16);
      border-radius:14px;
      background:rgba(0,0,0,.13);
      padding:12px;
    }
    .analysisTitle{
      font-weight:900;
      color:#ffe7a8;
      margin-bottom:8px;
      font-size:13px;
    }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .chip{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(247,215,123,.18);
      background:rgba(0,0,0,.18);
      color:#ffe7a8;
      font-size:12px;
      font-weight:700;
    }
    .chip.hot{border-color:rgba(255,120,120,.35); color:#ffd2b0;}
    .chip.cold{border-color:rgba(120,180,255,.35); color:#cfe6ff;}
    .chip.warn{border-color:rgba(255,190,110,.35); color:#ffe5b6;}

    .groupPreview{
      display:grid;
      gap:8px;
    }
    .groupRow{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(247,215,123,.16);
      background:rgba(0,0,0,.14);
      line-height:1.5;
    }
    .groupRow b{
      display:inline-block;
      min-width:72px;
      color:#ffe7a8;
    }
    .riskText{
      margin-top:6px;
      color:#ffd8a0;
      font-size:12px;
    }

    .prizeBox{
      display:grid;
      gap:10px;
    }
    .prizeItem{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:center;
      padding:10px;
      border:1px solid rgba(247,215,123,.16);
      background:rgba(0,0,0,.12);
      border-radius:12px;
    }
    @media (max-width:900px){
      .prizeItem{grid-template-columns:1fr}
    }
    .prizeGrid{
      display:grid;
      grid-template-columns: 1fr 1fr 120px;
      gap:10px;
      width:100%;
    }
    @media (max-width:900px){
      .prizeGrid{grid-template-columns:1fr}
    }

    .resultBox{
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(247,215,123,.22);
      background:radial-gradient(circle at 20% 20%, rgba(255,231,168,.18) 0%, rgba(0,0,0,.14) 55%);
      text-align:center;
      margin-top:10px;
    }
    .resultBox .who{
      font-size:42px;
      font-weight:900;
      letter-spacing:1px;
      color:#ffe7a8;
      text-shadow:0 6px 20px rgba(0,0,0,.5);
      word-break:break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .resultBox .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:12px;
    }

    .rolling {
      animation: rollPulse .12s infinite alternate;
      filter: drop-shadow(0 0 18px rgba(255,231,168,.55));
    }
    @keyframes rollPulse {
      from { transform: scale(1); opacity: .92; }
      to   { transform: scale(1.03); opacity: 1; }
    }
    .flashOnce{ animation: flashGlow .55s ease-out 1; }
    @keyframes flashGlow{
      0%   { box-shadow: 0 0 0 rgba(0,0,0,0); transform: scale(1); }
      20%  { box-shadow: 0 0 45px rgba(255,231,168,.55); transform: scale(1.01); }
      100% { box-shadow: 0 0 0 rgba(0,0,0,0); transform: scale(1); }
    }

    .log{
      margin-top:12px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(247,215,123,.15);
      max-height:320px;
      overflow:auto;
    }
    .log table{width:100%; border-collapse:collapse; background:rgba(0,0,0,.12)}
    .log th, .log td{
      padding:10px 10px;
      border-bottom:1px solid rgba(247,215,123,.10);
      font-size:13px;
      vertical-align:top;
    }
    .log th{color:#ffe7a8; text-align:left; background:rgba(0,0,0,.18)}
    .log td{color:var(--txt)}
    .log tr:last-child td{border-bottom:0}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;}

    .summaryOverlay{
      position:fixed; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.72);
      backdrop-filter: blur(2px);
      z-index: 60;
      padding:18px;
    }
    .summaryOverlay.show{display:flex;}
    .summaryCard{
      width:min(860px, 96vw);
      border-radius:22px;
      border:1px solid rgba(247,215,123,.28);
      background: radial-gradient(900px 360px at 25% 10%, rgba(255,231,168,.18) 0%, rgba(0,0,0,.08) 55%),
                  linear-gradient(180deg, rgba(20,2,2,.92), rgba(50,6,6,.92));
      box-shadow: 0 18px 60px rgba(0,0,0,.6);
      padding:22px 22px 18px;
      position:relative;
    }
    .summaryTitle{
      font-weight:900;
      color:#ffe7a8;
      font-size:22px;
      letter-spacing:.6px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-bottom:14px;
    }
    .summaryMain{
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }
    .summaryPrizeBar{
      width:100%;
      background: linear-gradient(180deg, #ffe7a8, #d7a84a);
      border-radius:14px;
      border:1px solid rgba(0,0,0,.25);
      color:#3a1a00;
      text-align:center;
      font-weight:1000;
      font-size:34px;
      padding:18px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      letter-spacing:.8px;
    }
    .summaryWinnerId{
      font-size:44px;
      font-weight:1000;
      letter-spacing:1px;
      color:#ffe7a8;
      text-shadow:0 12px 32px rgba(0,0,0,.65);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .summarySub{
      text-align:center;
      color:rgba(255,220,163,.85);
      margin-top:10px;
      font-size:12px;
      letter-spacing:.3px;
    }
    .summaryList{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .summaryChip{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(247,215,123,.22);
      background:rgba(0,0,0,.18);
      color:#ffe7a8;
      font-weight:800;
      letter-spacing:.4px;
      font-size:14px;
    }
    .summaryChip.final{
      background:linear-gradient(180deg, rgba(255,231,168,.22), rgba(215,168,74,.12));
      color:#fff3d0;
      border-color: rgba(247,215,123,.40);
      box-shadow: 0 0 0 3px rgba(247,215,123,.10);
    }
    .summaryActions{
      margin-top:18px;
      display:flex;
      justify-content:center;
    }

    .footerTip{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(0,0,0,.14);
      border:1px solid rgba(247,215,123,.12);
      font-size:12px;
      color:#ffdfab;
      line-height:1.6;
    }

    .toggleRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
      align-items:center;
    }
    .toggleChip{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(247,215,123,.22);
      background:rgba(0,0,0,.18);
      color:#ffe7a8;
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .toggleChip input{width:auto}

    .toastWrap{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .toast{
      min-width:260px;
      max-width:420px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(247,215,123,.22);
      background:linear-gradient(180deg, rgba(90,16,16,.96), rgba(40,6,6,.96));
      color:#fff3d0;
      box-shadow:0 14px 30px rgba(0,0,0,.45);
      font-size:13px;
      line-height:1.5;
      opacity:0;
      transform:translateY(10px);
      animation:toastIn .22s ease forwards;
    }
    .toast.ok{border-color:rgba(126,217,87,.4)}
    .toast.warn{border-color:rgba(255,179,71,.42)}
    .toast.info{border-color:rgba(120,200,255,.42)}
    #taskCenterFab.fabCompact{padding:12px 13px !important;transform:translateY(-72px) scale(.9);opacity:.94}
    #taskCenterFab,#broadcastFab{display:flex;align-items:center;gap:8px;max-width:min(42vw,220px)}#taskCenterFab.fabCompact span:last-child,#broadcastFab.fabCompact span:last-child{display:none}@media (max-width:900px){#taskCenterFab,#broadcastFab{right:12px !important;max-width:44vw}}
    #broadcastFab{background:linear-gradient(135deg,#6b35ff,#a04dff);border:1px solid rgba(255,255,255,.18)}
    #broadcastTargetModeRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .broadcast-pill{padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.16);cursor:pointer;background:rgba(255,255,255,.06);color:#f7f7f7;font-size:13px}
    .broadcast-pill.active{background:rgba(255,231,168,.16);border-color:rgba(247,215,123,.4);color:#ffe7a8}
    #broadcastPreviewBox{white-space:pre-wrap;line-height:1.7;max-height:180px;overflow:auto;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.14);border-radius:14px;padding:12px}
    #broadcastFileMeta{margin-top:8px}
    @keyframes toastIn{
      to{opacity:1; transform:translateY(0)}
    }
    @keyframes toastOut{
      to{opacity:0; transform:translateY(10px)}
    }
  
    .searchOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(8px);
      z-index:10000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .searchOverlay.show{display:flex}
    .searchCard{
      width:min(960px, 100%);
      border-radius:24px;
      border:1px solid rgba(247,215,123,.24);
      background:linear-gradient(180deg, rgba(45,8,8,.98), rgba(22,4,4,.98));
      box-shadow:0 30px 80px rgba(0,0,0,.55);
      padding:22px;
      color:#fff3d0;
    }
    .searchHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .searchTitle{font-size:24px;font-weight:800;color:#ffe7a8}
    .searchSub{font-size:13px;color:#ffd27a;line-height:1.6}
    .searchStatusPill{padding:8px 12px;border-radius:999px;border:1px solid rgba(247,215,123,.25);background:rgba(255,255,255,.06);font-size:12px;color:#ffe7a8}
    .searchBar{margin-top:14px;height:14px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);border:1px solid rgba(247,215,123,.18)}
    .searchBarFill{height:100%;width:0%;background:linear-gradient(90deg,#e0a83d,#f4d27a);transition:width .24s ease}
    .searchStats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:14px}
    .searchStat{padding:12px 14px;border-radius:16px;border:1px solid rgba(247,215,123,.18);background:rgba(255,255,255,.04)}
    .searchStat b{display:block;color:#ffe7a8;font-size:12px;margin-bottom:6px}
    .searchStat span{font-size:15px;font-weight:700}
    .searchGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-top:18px}
    .searchGroupCard{border-radius:18px;border:1px solid rgba(247,215,123,.18);background:rgba(255,255,255,.04);padding:14px;min-height:156px;position:relative;overflow:hidden}
    .searchGroupCard.locked{border-color:rgba(126,217,87,.38);box-shadow:0 0 0 1px rgba(126,217,87,.18) inset}
    .searchGroupCard.active{border-color:rgba(120,200,255,.4);box-shadow:0 0 0 1px rgba(120,200,255,.18) inset}
    .searchGroupTitle{font-size:14px;font-weight:800;color:#ffe7a8;display:flex;justify-content:space-between;gap:8px;align-items:center}
    .searchGroupBadge{font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(247,215,123,.18)}
    .searchGroupNums{margin-top:14px;font-size:24px;line-height:1.45;font-weight:800;letter-spacing:.5px;min-height:86px}
    .searchGroupHint{font-size:12px;color:#ffd27a;line-height:1.5}
    .searchFooter{margin-top:16px;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .searchFooterText{font-size:13px;color:#ffe7a8}
    .searchCloseBtn{padding:10px 14px;border-radius:12px;border:1px solid rgba(247,215,123,.22);background:rgba(255,255,255,.06);color:#ffe7a8}
    .spinPulse{animation:spinPulse .72s ease-in-out infinite}
    @keyframes spinPulse{0%,100%{opacity:.52;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
    @media (max-width: 900px){
      .searchGrid{grid-template-columns:1fr 1fr}
      .searchGroupCard:last-child{grid-column:1 / -1}
    }
    @media (max-width: 560px){
      .searchGrid{grid-template-columns:1fr}
    }

  </style>
</head>
<body>
  <div class="summaryOverlay" id="summaryOverlay" aria-hidden="true">
    <div class="summaryCard" role="dialog" aria-modal="true" aria-labelledby="summaryPrize">
      <div class="summaryTitle" id="summaryPrize">總結</div>
      <div class="summaryMain" id="summaryMain">—</div>
      <div class="summarySub" id="summarySub">已抽出 0 顆球</div>
      <div class="summaryList" id="summaryList"></div>
      <div class="summaryActions">
        <button class="secondary" id="btnSummaryClose">確認歸位</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logoBox">
          <img alt="LOGO" src="assets/logo/logo.png" onerror="this.style.display='none'">
        </div>
        <div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const API_BASE = "https://17-539-api-production-9873.up.railway.app";
  const API_FALLBACK_BASE = window.location.origin;

  const CONFIG = {
    autoRefreshMs: 30 * 1000,

    storageKey: "lottery_dual_machine_v312_dual_tracking",
    taskQueueKey: "lottery_dual_machine_v312_task_queue",

      l539: [`${API_BASE}/api/539`, `${API_FALLBACK_BASE}/api/539`]

  }

  }

  }

  const state = {

    },
    trackingSubmitLocks: {
      ttl: false,
      l539: false
    },

      queue: []
    }
  };

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getTaipeiParts(){
    const parts = new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(new Date());
    const pick = type => parts.find(x=>x.type===type)?.value || "";
    return {
      year: pick("year"),
      month: pick("month"),
      day: pick("day"),
      hour: pick("hour"),
      minute: pick("minute"),
      second: pick("second")
    };
  }

  function nowStr(){
    const t = getTaipeiParts();
    return `${t.hour}:${t.minute}:${t.second}`;
  }

  function nowFull(){
    const t = getTaipeiParts();
    return `${t.year}-${t.month}-${t.day} ${t.hour}:${t.minute}:${t.second}`;
  }

  function setTaipeiClock(){
    const el = $("clockText");
    if(!el) return;
    const render = () => {
      try{
        const parts = new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).formatToParts(new Date());
        const pick = type => parts.find(x=>x.type===type)?.value || "";
        el.textContent = `${pick("year")}-${pick("month")}-${pick("day")} ${pick("hour")}:${pick("minute")}:${pick("second")}`;
      }catch(e){
        el.textContent = nowFull();
      }
    };
    render();
    setInterval(render, 1000);
  }

  let __winnerAudio = null;
  let __winnerMusicTimer = null;
  let __winnerMusicCtx = null;
  let __tickLastAt = 0;

  function ensureAudio(){
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return null;
      const ctx = (window.__dingCtx ||= new AudioCtx());
      if (ctx.state === "suspended") ctx.resume?.();
      return ctx;
    }catch(e){ return null; }
  }

  function playDing(){
    ensureAudio();
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const ctx = (window.__dingCtx ||= new AudioCtx());
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.06);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.45, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.24);
    }catch(e){}
  }

  function playTick(){
    try{
      const ctx = ensureAudio();
      if(!ctx) return;
      const now = ctx.currentTime;
      if (now - __tickLastAt < 0.04) return;
      __tickLastAt = now;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = "square";
      const step = (window.__tickStep = (window.__tickStep||0) + 1);
      const seq = [180, 220, 196, 247];
      osc.frequency.setValueAtTime(seq[step % seq.length], now);

      filter.type = "bandpass";
      filter.frequency.setValueAtTime(900, now);
      filter.Q.setValueAtTime(10, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.045);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.05);
    }catch(e){}
  }

  function startWinnerMusic(){
    try{
      const dataUrl = localStorage.getItem("winner_bgm_dataurl_v1");
      if (dataUrl){
        if(!__winnerAudio){
          __winnerAudio = new Audio(dataUrl);
          __winnerAudio.loop = true;
          __winnerAudio.volume = 0.65;
        }
        __winnerAudio.currentTime = 0;
        __winnerAudio.play().catch(()=>{});
        return;
      }
    }catch(e){}

    if (__winnerMusicCtx) return;
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    __winnerMusicCtx = new AudioCtx();
    const ctx = __winnerMusicCtx;

    const master = ctx.createGain();
    master.gain.value = 0.25;
    master.connect(ctx.destination);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1400;
    lp.Q.value = 0.5;
    lp.connect(master);

    const pluck = (freq, t, dur=0.18, vol=0.18)=>{
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(freq, t);
      o.frequency.exponentialRampToValueAtTime(freq*0.995, t+dur);

      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);

      o.connect(g); g.connect(lp);
      o.start(t); o.stop(t+dur+0.02);
    };

    const chord = (root, t)=>{
      pluck(root, t, 0.22, 0.14);
      pluck(root*1.2599, t+0.02, 0.20, 0.11);
      pluck(root*1.4983, t+0.04, 0.22, 0.10);
      pluck(root*2, t+0.10, 0.12, 0.06);
    };

    const ROOT = { C4:261.63, G3:196.00, A3:220.00, F3:174.61 };
    const roots = [ROOT.C4, ROOT.G3, ROOT.A3, ROOT.F3];
    const N = { C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00 };
    const bpm = 112;
    const beat = 60 / bpm;
    const bar  = beat * 4;
    const base = ctx.currentTime + 0.08;
    const melody = [
      [N.E5,N.G5,N.E5,N.D5, N.C5,N.D5,N.E5,N.G5],
      [N.D5,N.E5,N.G5,N.A5, N.G5,N.E5,N.D5,N.E5],
      [N.E5,N.E5,N.D5,N.C5, N.D5,N.E5,N.G5,N.A5],
      [N.F5,N.G5,N.A5,N.G5, N.E5,N.D5,N.C5,N.D5],
    ];

    const scheduleOnce = (loopIndex)=>{
      const loopT = base + loopIndex*(bar*4);
      for(let b=0;b<4;b++){
        const tBar = loopT + b*bar;
        chord(roots[b], tBar);
        for(let i=0;i<8;i++){
          const t = tBar + i*(beat/2);
          pluck(melody[b][i], t, 0.16, 0.14);
        }
      }
    };

    let loop = 0;
    scheduleOnce(loop);
    __winnerMusicTimer = setInterval(()=>{
      if(!__winnerMusicCtx) return;
      loop++;
      scheduleOnce(loop);
    }, Math.max(200, (bar * 4 * 1000) - 80));
  }

  async function stopWinnerMusic(){
    if(__winnerAudio){ try{ __winnerAudio.pause(); }catch(e){} }
    if(__winnerMusicTimer){
      clearInterval(__winnerMusicTimer);
      __winnerMusicTimer = null;
    }
    if(__winnerMusicCtx){
      try{ await __winnerMusicCtx.close(); }catch(e){}
    }
    __winnerMusicCtx = null;
  }

function updateSearchOverlay(id, progress){
  if(!searchAnimState.visible) openSearchOverlay(id);
  const els = getSearchEls();
  const searched = progress?.searched || 0;
  const target = progress?.target || 5;
  const elapsedMs = progress?.elapsedMs || 0;
  const percent = target > 0 ? Math.min(100, (searched / target) * 100) : 0;
  const rate = elapsedMs > 0 ? searched / (elapsedMs / 1000) : 0;
  const etaMs = rate > 0 ? ((target - searched) / rate) * 1000 : 1000;
  els.fill.style.width = `${percent}%`;
  els.searched.textContent = searched.toLocaleString();
  els.target.textContent = target.toLocaleString();
  els.stage.textContent = progress?.stageLabel || '生成中';
  els.elapsed.textContent = `${(elapsedMs / 1000).toFixed(1)} 秒`;
  els.eta.textContent = formatEta(etaMs);
  els.pill.textContent = progress?.statusText || '生成中';
  els.footer.textContent = progress?.footerText || '系統正在避開高風險雙號 / 三連號，並拆散熱號到不同組別。';
}

async function lockSearchResult(id, bestResult){

  searchAnimState.running = false;

    const cardEl = $(`searchCard_${i}`); const numsEl = $(`searchNums_${i}`); const hintEl = $(`searchHint_${i}`); const badgeEl = $(`searchBadge_${i}`);
    const nums = bestResult.groups[names[i]] || [];
    if(cardEl){ cardEl.classList.remove('active'); cardEl.classList.add('locked'); }

    await sleep(180);
  }
  els.pill.textContent = '可通報';
  els.stage.textContent = '全部鎖定完成';
}

function cleanupNumbers(arr, maxNum){
    return [...new Set(
      arr.map(n => String(parseInt(n,10)).padStart(2,"0"))
         .filter(n => {
            const v = parseInt(n,10);
            return !isNaN(v) && v >= 1 && v <= maxNum;
         })
    )];
  }

  function comboKey(nums){
    return [...nums]
      .map(n => String(parseInt(n,10)).padStart(2,"0"))
      .sort((a,b)=>parseInt(a,10)-parseInt(b,10))
      .join("-");
  }

  function getCombinations(arr, k){
    const result = [];
    const n = arr.length;
    function backtrack(start, path){
      if(path.length === k){
        result.push([...path]);
        return;
      }
      for(let i=start;i<n;i++){
        path.push(arr[i]);
        backtrack(i+1, path);
        path.pop();
      }
    }
    backtrack(0, []);
    return result;
  }

  function intersectionCount(a, b){
    const setB = new Set(b);
    let count = 0;
    a.forEach(x=>{ if(setB.has(x)) count++; });
    return count;
  }

    const lines = String(text || "").split(/\r?\n/).map(x=>x.trim()).filter(Boolean);

      if(/開獎號碼\s+(\d{2}\s+){4}\d{2}$/.test(line)) ok++;
    }
    return ok >= 1;

  function apiPathCandidates(path){
    return [`${API_BASE}${path}`, `${API_FALLBACK_BASE}${path}`];
  }

  async function postJsonApi(path, payload){
    let lastErr = null;
    for(const target of apiPathCandidates(path)){
      try{
        const res = await fetch(target, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload || {})
        });
        const text = await res.text();
        let json = {};
        try{ json = text ? JSON.parse(text) : {}; }catch(_){ json = { message: text || 'API 未回傳 JSON' }; }
        if(!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
        json.__fetchedUrl = target;
        return json;
      }catch(err){
        lastErr = err;
      }
    }
    throw lastErr || new Error('API 寫入失敗');
  }



  function readFileAsDataUrl(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>resolve(String(reader.result || ''));
      reader.onerror = ()=>reject(new Error('附件讀取失敗'));
      reader.readAsDataURL(file);
    });
  }

  function splitChatIdsInput(value){
    return String(value || '').split(/[\n,;]+/).map(v=>String(v||'').trim()).filter(Boolean);
  }

  async function fetchJson(url){
    const urls = Array.isArray(url) ? url : [url];
    let lastErr = null;
    for(const target of urls){
      if(!target) continue;
      try{
        const res = await fetch(target, { cache: "no-store" });
        const text = await res.text();
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        try{
          const json = JSON.parse(text);
          json.__fetchedUrl = target;
          return json;
        }catch(e){
          throw new Error("API 未正確回傳 JSON");
        }
      }catch(err){
        lastErr = err;
      }
    }
    throw lastErr || new Error('API 讀取失敗');
  }

  function getWeekdayText(dateStr){
    const m = String(dateStr || "").match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
    if(!m) return "";
    const y = parseInt(m[1], 10);
    const mo = parseInt(m[2], 10) - 1;
    const d = parseInt(m[3], 10);
    const dt = new Date(y, mo, d);
    const weekdays = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
    return weekdays[dt.getDay()] || "";
  }

  function formatShortDate(dateStr){
    const m = String(dateStr || "").match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
    if(!m) return String(dateStr || "");
    return `${parseInt(m[1],10)}/${parseInt(m[2],10)}/${parseInt(m[3],10)}`;
  }

  function historyRecordsToText(records){
    return records.map((r) => {
      const sortedNums = (Array.isArray(r.numbers) ? r.numbers : [])
        .map(n => parseInt(n, 10))
        .filter(n => !isNaN(n))
        .sort((a,b)=>a-b)
        .map(n => String(n).padStart(2,"0"))
        .join(" ");

      const shortDate = formatShortDate(r.date);
      const weekday = getWeekdayText(r.date);

      return `${shortDate}(${weekday}) 開獎號碼 ${sortedNums}`;
    }).join("\n");
  }

  function historyHash(text){
    let h = 0;
    for(let i=0;i<text.length;i++){
      h = ((h << 5) - h) + text.charCodeAt(i);
      h |= 0;
    }
    return String(h);
  }

  async function syncHistory(id, silent=false){
    const s = state.lotteries[id];
    const el = getEls(id);

    try{
      setSyncState(id, "同步中…", "warn");

      const data = await fetchJson(s.cfg.syncUrl);
      const records = Array.isArray(data.draws) ? data.draws : [];

      if(!records.length){
        throw new Error("API 沒有回傳有效開獎資料");
      }

      const validRecords = records
        .filter(r => Array.isArray(r.numbers) && r.numbers.length === 5)
        .map(r => ({
          date: r.date || "",
          numbers: r.numbers.map(n => String(parseInt(n, 10)).padStart(2, "0"))
        }));

      if(!validRecords.length){
        throw new Error("API 有回資料，但格式不正確");
      }

      const limited = validRecords.slice(0, CONFIG.fetchLimit);
      const text = historyRecordsToText(limited);
      const hash = historyHash(text);

      const changed = s.lastSyncHash && s.lastSyncHash !== hash;
      s.lastSyncHash = hash;
      s.restoredHistoryText = text;

      el.historyInput.value = text;
      setSyncState(id, changed ? "已更新新結果" : "同步完成", "ok");
      el.syncNote.textContent = `資料來源：${data.__fetchedUrl || (Array.isArray(s.cfg.syncUrl) ? s.cfg.syncUrl[0] : s.cfg.syncUrl)} ｜ 最新同步：${nowFull()} ｜ 共 ${limited.length} 期`;

      s.historyAnalysis = analyzeHistoryText(id, text);
      renderHistoryAnalysis(id, s.historyAnalysis);
      persistAll();

      if(changed && !silent){
        showMiniNotice(`${s.cfg.title} 已抓到新結果並更新 ${getHistoryWindowText()}資料`, "ok");
      }else if(!silent){
        showMiniNotice(`${s.cfg.title} 同步完成`, "info");
      }

      return true;
    }catch(err){
      setSyncState(id, "同步失敗", "warn");
      el.syncNote.textContent = `資料來源：${Array.isArray(s.cfg.syncUrl) ? s.cfg.syncUrl.join(' / ') : s.cfg.syncUrl} ｜ 同步失敗：${err.message}`;
      if(!silent) showMiniNotice(`${s.cfg.title} 同步失敗：${err.message}`, "warn");
      return false;
    }
  }

  function parseHistoryText(id, text){
    const maxNum = state.lotteries[id].cfg.maxNum;
    const counts = {};
    for(let i=1;i<=maxNum;i++){
      counts[String(i).padStart(2,"0")] = 0;
    }

    const lines = String(text || "").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    let drawCount = 0;
    const draws = [];

    lines.forEach(line=>{
      const m = line.match(/開獎號碼\s+((?:\d{2}\s+){4}\d{2})$/);
      if(!m) return;

      const nums = m[1]
        .trim()
        .split(/\s+/)
        .map(n => String(parseInt(n,10)).padStart(2,"0"))
        .filter(Boolean);

      if(nums.length !== 5) return;

      drawCount++;
      draws.push(nums);
      nums.forEach(n => counts[n]++);
    });

    return { counts, drawCount, draws };
  }

  function analyzeHistoryText(id, text){
    const { counts, drawCount, draws } = parseHistoryText(id, text);
    const maxNum = state.lotteries[id].cfg.maxNum;
    const analysisWindow = getAnalysisWindow();
    const evaluatedWindow = Math.min(drawCount, analysisWindow);
    const recentDraws = draws.slice(0, analysisWindow);
    const shortWindow = Math.min(recentDraws.length, Math.max(18, Math.min(30, analysisWindow)));
    const mediumWindow = Math.min(recentDraws.length, Math.max(shortWindow, Math.min(60, analysisWindow)));
    const shortDraws = recentDraws.slice(0, shortWindow);
    const mediumDraws = recentDraws.slice(0, mediumWindow);
    const countsWindow = {};
    const shortCounts = {};
    const mediumCounts = {};
    const pairCountsWindow = {};
    const tripleCountsWindow = {};

    for(let i=1;i<=maxNum;i++){
      const key = String(i).padStart(2,'0');
      countsWindow[key] = 0;
      shortCounts[key] = 0;
      mediumCounts[key] = 0;
    }

    recentDraws.forEach(draw=>{
      draw.forEach(n=> countsWindow[n] = (countsWindow[n] || 0) + 1);
      getCombinations(draw, 2).forEach(pair=>{
        const key = comboKey(pair);
        pairCountsWindow[key] = (pairCountsWindow[key] || 0) + 1;
      });
      getCombinations(draw, 3).forEach(triple=>{
        const key = comboKey(triple);
        tripleCountsWindow[key] = (tripleCountsWindow[key] || 0) + 1;
      });
    });

    shortDraws.forEach(draw=> draw.forEach(n => shortCounts[n] = (shortCounts[n] || 0) + 1));
    mediumDraws.forEach(draw=> draw.forEach(n => mediumCounts[n] = (mediumCounts[n] || 0) + 1));

    const arr = Object.keys(countsWindow).map((num)=>({
      num,
      count: countsWindow[num] || 0,
      shortCount: shortCounts[num] || 0,
      mediumCount: mediumCounts[num] || 0,
      shortRate: shortWindow ? (shortCounts[num] || 0) / shortWindow : 0,
      mediumRate: mediumWindow ? (mediumCounts[num] || 0) / mediumWindow : 0,
      longRate: evaluatedWindow ? (countsWindow[num] || 0) / evaluatedWindow : 0
    }));

    arr.forEach(item=>{
      item.trendScore = (item.shortRate - item.longRate) * 100 + (item.mediumRate - item.longRate) * 45;
      item.heatScore = item.longRate * 100 + item.shortRate * 55 + item.trendScore * 0.8;
      item.coldScore = (item.longRate * -75) + (item.shortRate * -35) + (item.trendScore * -0.6);
    });

    const hotRank = [...arr].sort((a,b)=> b.heatScore - a.heatScore || b.count - a.count || parseInt(a.num,10) - parseInt(b.num,10));
    const coldRank = [...arr].sort((a,b)=> a.heatScore - b.heatScore || a.count - b.count || parseInt(a.num,10) - parseInt(b.num,10));
    const trendUpRank = [...arr].sort((a,b)=> b.trendScore - a.trendScore || b.shortCount - a.shortCount || parseInt(a.num,10) - parseInt(b.num,10));
    const trendDownRank = [...arr].sort((a,b)=> a.trendScore - b.trendScore || a.shortCount - b.shortCount || parseInt(a.num,10) - parseInt(b.num,10));

    const hot = hotRank.slice(0, 10).map(x=>x.num);
    const cold = coldRank.slice(0, 10).map(x=>x.num);
    const warm = hotRank.slice(10, 20).map(x=>x.num).filter(n=> !cold.includes(n));
    const mid = arr.map(x=>x.num).filter(n=>!hot.includes(n) && !cold.includes(n));
    const trendUp = trendUpRank.slice(0, 8).map(x=>x.num).filter(n=> !cold.includes(n));
    const trendDown = trendDownRank.slice(0, 8).map(x=>x.num).filter(n=> !hot.includes(n));

    const pairHitThreshold = analysisWindow >= 100 ? 3 : 2;
    const tripleHitThreshold = analysisWindow >= 100 ? 2 : 1;

    const highRiskPairs = new Set(
      Object.entries(pairCountsWindow)
        .filter(([,count]) => count >= pairHitThreshold)
        .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
        .slice(0, 24)
        .map(([key])=>key)
    );

    const highRiskTriples = new Set(
      Object.entries(tripleCountsWindow)
        .filter(([,count]) => count >= tripleHitThreshold)
        .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
        .slice(0, 12)
        .map(([key])=>key)
    );

    const riskyNumberSet = new Set();
    [...highRiskPairs].forEach(key=> key.split('-').forEach(n=> riskyNumberSet.add(n)));
    [...highRiskTriples].forEach(key=> key.split('-').forEach(n=> riskyNumberSet.add(n)));

    const topPairs = Object.entries(pairCountsWindow)
      .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
      .slice(0, 8);

    const topTriples = Object.entries(tripleCountsWindow)
      .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
      .slice(0, 8);

    const countRankMap = {};
    hotRank.forEach((item, idx)=>{ countRankMap[item.num] = idx + 1; });
    const heatScoreMap = {};
    const trendScoreMap = {};
    arr.forEach(item=>{
      heatScoreMap[item.num] = Number(item.heatScore.toFixed(2));
      trendScoreMap[item.num] = Number(item.trendScore.toFixed(2));
    });

    return {
      counts: countsWindow,
      drawCount,
      draws,
      analysisWindow,
      evaluatedWindow,
      shortWindow,
      mediumWindow,
      hot,
      warm,
      cold,
      mid,
      trendUp,
      trendDown,
      hotRank,
      coldRank,
      trendUpRank,
      trendDownRank,
      countsWindow,
      shortCounts,
      mediumCounts,
      pairCounts: pairCountsWindow,
      tripleCounts: tripleCountsWindow,
      pairCountsWindow,
      tripleCountsWindow,
      highRiskPairMinHits: pairHitThreshold,
      highRiskTripleMinHits: tripleHitThreshold,
      highRiskPairs,
      highRiskTriples,
      riskyNumberSet,
      topPairs,
      topTriples,
      heatScoreMap,
      trendScoreMap,
      countRankMap
    };
  }

  function shuffle(arr){
    const copy = [...arr];
    for(let i=copy.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function scoreSingleGroup(nums, analysis){
    let score = 0;

    nums.forEach(n=>{
      score += (analysis.counts[n] || 0) * 12;
    });

    getCombinations(nums, 2).forEach(pair=>{
      const key = comboKey(pair);
      score += (analysis.pairCounts[key] || 0) * 900;
    });

    getCombinations(nums, 3).forEach(triple=>{
      const key = comboKey(triple);
      score += (analysis.tripleCounts[key] || 0) * 4000;
    });

    analysis.draws.forEach(draw=>{
      const hit = intersectionCount(nums, draw);
      if(hit === 2) score += 80000;
      if(hit === 3) score += 200000;
      if(hit === 1) score -= 200;
      if(hit === 0) score += 30;
    });

    return score;
  }

  function evaluatePartition(groups, analysis){
    let total = 0;
    let twoHitRisk = 0;
    let threeHitRisk = 0;

    groups.forEach(g=>{
      total += scoreSingleGroup(g, analysis);
      analysis.draws.forEach(draw=>{
        const hit = intersectionCount(g, draw);
        if(hit === 2) twoHitRisk++;
        if(hit === 3) threeHitRisk++;
      });
    });

    total += twoHitRisk * 1000000;
    total += threeHitRisk * 3000000;
    return { total, twoHitRisk, threeHitRisk };
  }

    const s = state.lotteries[id];
    if(!s.lastAction){
      showMiniNotice(`${s.cfg.title}：沒有可撤銷的動作`, "warn");
      return;
    }

    if (s.lastAction.multi){
      const count = s.lastAction.count || 0;
      for(let i = 0; i < count; i++) s.log.pop();

      if (s.lastAction.removedFromPool){
        [...s.lastAction.removedItems].reverse().forEach(item => {
          const idx = Math.min(Math.max(item.index, 0), s.pool.length);
          s.pool.splice(idx, 0, item.value);
        });
      }
    }else{
      s.log.pop();
      if (s.lastAction.removedFromPool){
        const idx = Math.min(Math.max(s.lastAction.removedIndex, 0), s.pool.length);
        s.pool.splice(idx, 0, s.lastAction.removedValue);
      }
    }

    s.lastAction = null;
    setWinner(id, null, "");
    renderLog(id);
    updateStats(id);
    persistAll();
    showMiniNotice(`${s.cfg.title}：已撤銷上一筆`, "info");
  }

  function buildHorizontalPrizeRows(log){
    if (!Array.isArray(log) || log.length === 0) return [];

    const order = ["第一組", "第二組", "第三組", "第四組", "全車號碼"];
    const grouped = new Map();

    log.forEach(item => {
      const key = item.prizeDesc || "未分類";
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(String(item.who || "").padStart(2, "0"));
    });

    const rows = [];
    order.forEach(name => {
      if (grouped.has(name)) {
        rows.push([name, ...grouped.get(name)]);
        grouped.delete(name);
      }
    });

    for (const [name, nums] of grouped.entries()) {
      rows.push([name, ...nums]);
    }

    return rows;
  }

  async function drawOne(id, prizeLabel="隨機", prizeDesc="", showSummaryAfter=false){
    const s = state.lotteries[id];
    const el = getEls(id);
    if (s.pool.length === 0){
      showMiniNotice(`${s.cfg.title}：目前沒有可抽名單`, "warn");
      return null;
    }
    if (s.rolling) return null;
    s.rolling = true;

    const drawModeSel = el.drawMode.value || "remove";

    try{
      el.currentWinner.classList.add("rolling");

      const rollMs = 90;
      const tickEvery = 16;
      const start = performance.now();

      while (performance.now() - start < rollMs){
        const tmp = s.pool[Math.floor(Math.random() * s.pool.length)];
        setWinner(id, tmp, prizeDesc ? `${prizeLabel}（${prizeDesc}）` : prizeLabel);
        playTick();
        await sleep(tickEvery);
      }

      const idx = Math.floor(Math.random() * s.pool.length);
      const realWinner = s.pool[idx];

      let removedFromPool = false;
      if (drawModeSel === "remove"){
        s.pool.splice(idx, 1);
        removedFromPool = true;
      }

      const logItem = {
        dt: nowFull(),
        prize: prizeLabel,
        prizeDesc: prizeDesc || "",
        who: String(realWinner).padStart(2, "0")
      };
      s.log.push(logItem);

      s.lastAction = { multi: false, removedFromPool, removedValue: realWinner, removedIndex: idx };

      setWinner(id, String(realWinner).padStart(2, "0"), prizeDesc ? `${prizeLabel}（${prizeDesc}）` : prizeLabel);
      renderLog(id);
      updateStats(id);
      playDing();
      flashOnce(id);

      el.currentWinner.classList.remove("rolling");
      s.rolling = false;

      persistAll();
      maybeAutoDownloadXlsx(id);

      if (showSummaryAfter){
        await sleep(60);
        showSummary(prizeLabel, prizeDesc, [String(realWinner).padStart(2, "0")]);
      }
      return String(realWinner).padStart(2, "0");
    }catch(e){
      try{ el.currentWinner.classList.remove("rolling"); }catch(_){}
      s.rolling = false;
      showMiniNotice(`${s.cfg.title}：抽獎發生錯誤`, "warn");
      return null;
    }
  }

          const padWinner = String(realWinner).padStart(2, "0");
          winners.push(padWinner);
          removedItems.push({ value: realWinner, index: idx });
          s.pool.splice(idx, 1);
        }
      }else{
        for(let i = 0; i < takeCount; i++){
          const idx = Math.floor(Math.random() * s.pool.length);
          winners.push(String(s.pool[idx]).padStart(2, "0"));
        }
      }

      const drawTime = nowFull();
      winners.forEach((winner) => {
        s.log.push({
          dt: drawTime,
          prize: prizeLabel,
          prizeDesc: prizeDesc || "",
          who: winner
        });
      });

      s.lastAction = {
        multi: true,
        removedFromPool: drawModeSel === "remove",
        removedItems,
        count: winners.length
      };

      const finalWinner = winners[winners.length - 1] || "—";
      setWinner(id, finalWinner, prizeDesc ? `${prizeLabel}（${prizeDesc}）` : prizeLabel);

      renderLog(id);
      updateStats(id);
      playDing();
      flashOnce(id);

      el.currentWinner.classList.remove("rolling");
      s.rolling = false;

      persistAll();
      maybeAutoDownloadXlsx(id);

      if (showSummaryAfter && winners.length){
        await sleep(60);
        showSummary(prizeLabel, prizeDesc, winners);
      }

      return winners;
    }catch(e){
      try{ el.currentWinner.classList.remove("rolling"); }catch(_){}
      s.rolling = false;
      showMiniNotice(`${s.cfg.title}：抽獎發生錯誤`, "warn");
      return [];
    }
  }

  function restoreState(){
    try{
      const raw = localStorage.getItem(CONFIG.storageKey);
      if(!raw) return false;
      const data = JSON.parse(raw);

      if(data?.settings){
        state.settings = {
          ...state.settings,
          ...data.settings
        };
      }

      Object.keys(data?.lotteries || {}).forEach(id=>{
        const saved = data.lotteries[id];
        const s = state.lotteries[id];
        if(!s) return;
        const els = getEls(id);

        s.allList = Array.isArray(saved.allList) ? saved.allList : [];
        s.pool = Array.isArray(saved.pool) ? saved.pool : [];
        s.log = Array.isArray(saved.log) ? saved.log : [];
        s.lastSyncHash = saved.lastSyncHash || "";
        s.autoRefreshEnabled = saved.autoRefreshEnabled !== false;
        s.restoredHistoryText = saved.historyText || "";

        els.listInput.value = saved.listText || "";
        els.historyInput.value = saved.historyText || "";
        els.cleanupMode.value = saved.cleanupMode || "trim";
        els.drawMode.value = saved.drawMode || "remove";
        els.autoDownloadXlsx.checked = !!saved.autoDownloadXlsx;
        if($(`${id}_manualSource`)) $(`${id}_manualSource`).value = saved?.manualInputs?.source || '';
        if($(`${id}_manualFull`)) $(`${id}_manualFull`).value = saved?.manualInputs?.full || '';
        if($(`${id}_manualGroup1`)) $(`${id}_manualGroup1`).value = saved?.manualInputs?.group1 || '';
        if($(`${id}_manualGroup2`)) $(`${id}_manualGroup2`).value = saved?.manualInputs?.group2 || '';
        if($(`${id}_manualGroup3`)) $(`${id}_manualGroup3`).value = saved?.manualInputs?.group3 || '';
        if($(`${id}_manualGroup4`)) $(`${id}_manualGroup4`).value = saved?.manualInputs?.group4 || '';

        if(Array.isArray(saved.prizes)){
          saved.prizes.forEach((p, idx)=>{
            const i = idx + 1;
            if($(`${id}_prize${i}Label`)) $(`${id}_prize${i}Label`).value = p.label ?? "";
            if($(`${id}_prize${i}Desc`)) $(`${id}_prize${i}Desc`).value = p.desc ?? "";
            if($(`${id}_prize${i}Count`)) $(`${id}_prize${i}Count`).value = p.count ?? "1";
          });
        }

        if(saved.historyText){
          s.historyAnalysis = analyzeHistoryText(id, saved.historyText);
        }else{
          s.historyAnalysis = null;
        }
      });

      $("saveStateText").textContent = state.settings.autoSave ? "開啟" : "關閉";
      return true;
    }catch(e){

    }
  }

  async function confirmTracking(id){
    const s = state.lotteries[id];
    if(!s.generatedGroups || !s.generatedGroups.groups || s.generatedGroups.noQualifiedResult || s.generatedGroups.canNotify === false){
      showMiniNotice(`${s.cfg.title}：目前沒有合格低風險方案，請先執行自動生成搜尋`, "warn");
      return;
    }

    if(state.trackingSubmitLocks[id]){
      showMiniNotice(`${s.cfg.title}：通報處理中，請勿重複點擊`, "warn");
      return;
    }

    const btn = $(`${id}_btnConfirmTracking`);
    if(btn && btn.disabled){
      showMiniNotice(`${s.cfg.title}：通報處理中，請稍候`, "warn");
      return;
    }

    const oldText = btn ? btn.textContent : "";
    state.trackingSubmitLocks[id] = true;

    if(btn){
      btn.disabled = true;
      btn.textContent = "通報中...";
    }

    const order = [
      $(`${id}_prize1Desc`).value.trim() || "第一組",
      $(`${id}_prize2Desc`).value.trim() || "第二組",
      $(`${id}_prize3Desc`).value.trim() || "第三組",
      $(`${id}_prize4Desc`).value.trim() || "第四組",
      $(`${id}_prize5Desc`).value.trim() || "全車號碼"
    ];

    const groups = s.generatedGroups.groups || {};
    const normalizedGroups = {
      group1: cleanupNumbers(groups[order[0]] || [], s.cfg.maxNum),
      group2: cleanupNumbers(groups[order[1]] || [], s.cfg.maxNum),
      group3: cleanupNumbers(groups[order[2]] || [], s.cfg.maxNum),
      group4: cleanupNumbers(groups[order[3]] || [], s.cfg.maxNum),
      full: cleanupNumbers(groups[order[4]] || [], s.cfg.maxNum)
    };
    const payload = {
      lotteryType: id === "ttl" ? "ttl" : "539",
      lotteryTitle: s.cfg.title,
      confirmedAt: nowFull(),
      groups: normalizedGroups,
      labels: {
        group1: order[0],
        group2: order[1],
        group3: order[2],
        group4: order[3],
        full: order[4]
      },
      analysis: buildTrackingAnalysisMetaFromGroups(normalizedGroups, s.historyAnalysis || null)
    };

    try{
      const result = await postJsonApi('/api/confirm-tracking', payload);
      if(result?.busy){
        showMiniNotice(`${s.cfg.title}：${result.message || "通報處理中，請勿重複點擊"}`, "warn");
      }else{
        showMiniNotice(`${s.cfg.title}：${result.message || "通報已送出"}`, "ok");
        refreshTrackingBoard(id, { silent: true });
      }
    }catch(err){
      showMiniNotice(`${s.cfg.title}：通報失敗：${err.message || '未知錯誤'}`, "warn");
    }finally{
      state.trackingSubmitLocks[id] = false;
      if(btn){
        btn.disabled = false;
        btn.textContent = oldText || "確定通報";
      }
    }
  }

  function buildDisplayRecommendation(row, apiRec){
    const analysis = row?.analysis || {};
    const details = Array.isArray(analysis.riskGroupDetails) ? analysis.riskGroupDetails.slice(0,4) : [];
    const analyzedDraws = Number(analysis.evaluatedWindow || analysis.analysisWindow || analysis.drawCount || 0);
    if(!details.length || analyzedDraws <= 0){
      return {
        trackingId: row?.id || apiRec?.trackingId || '',
        passTendency: Number(apiRec?.passTendency || 0),
        riskLevel: analyzedDraws > 0 ? '待補分析' : '尚未同步分析',
        reliability: analyzedDraws > 0 ? Number(apiRec?.reliability || 0) : 0,
        positives: analyzedDraws > 0
          ? ['此筆追蹤尚未帶入完整逐組分析，請重新建立一次追蹤']
          : ['目前這筆追蹤沒有綁到近期待開獎歷史資料，無法判斷熱號/雙連號/三連號'],
        negatives: analyzedDraws > 0
          ? ['不是每組都安全，而是這筆舊追蹤缺少 analysis 欄位']
          : ['請先按同步開獎，再重新建立或重送這筆追蹤'],
        bestGroupText: analyzedDraws > 0 ? '可直接按「重算分析」補回逐組結果' : '尚未同步歷史資料',
        riskGroupText: analyzedDraws > 0 ? '目前先以空分析顯示' : '目前無法比較四組風險',
        structureSummary: analyzedDraws > 0 ? 'analysis 欄位缺失，可補算' : 'drawCount=0，現在看到的 0 不是分析結果',
        actionAdvice: analyzedDraws > 0 ? '按下重算分析，系統會用最新歷史補回資料' : '先同步最新歷史，再按重算分析或重新送出追蹤',
        profile: analyzedDraws > 0 ? '舊追蹤' : '未同步',
        groupLineTexts: []
      };
    }

    const metrics = details.map((detail, idx)=>{
      const pairExposure = Number(detail.groupPairExposure || 0);
      const tripleExposure = Number(detail.groupTripleExposure || 0);
      const riskyNums = Array.isArray(detail.riskyNumbers) ? detail.riskyNumbers.filter(Boolean) : [];
      const pairHits = Array.isArray(detail.riskyPairHits) ? detail.riskyPairHits.filter(Boolean) : [];
      const tripleHits = Array.isArray(detail.riskyTripleHits) ? detail.riskyTripleHits.filter(Boolean) : [];
      const hotCount = Number(detail.hotCount || 0);
      const warmCount = Number(detail.warmCount || 0);
      const midCount = Number(detail.midCount || 0);
      const coldCount = Number(detail.coldCount || 0);
      const trendUpCount = Number(detail.trendUpCount || 0);
      const trendDownCount = Number(detail.trendDownCount || 0);
      const fingerprint = Number(detail.identityFingerprint || 0);
      const heatScore = Number(detail.groupHeatScore || 0);
      const trendScore = Number(detail.groupTrendScore || 0);
      const tailFocus = Number(detail.tailFocus || 0);
      const decadeFocus = Number(detail.decadeFocus || 0);
      const adjacency = Array.isArray(detail.adjacentPairs) ? detail.adjacentPairs.length : 0;
      const oddCount = Number(detail.oddCount || 0);
      const spanValue = Number(detail.spanValue || 0);
      const fingerprintBucket = Math.abs(fingerprint % 7);
      const balanceGap = Math.abs(hotCount - 1.5) + Math.abs(pairExposure - 1.2) * 0.7 + Math.abs(tripleExposure - 0.4) * 1.2 + Math.max(0, tailFocus - 2) * 0.9 + Math.abs(oddCount - 2.5) * 0.7;
      const riskScore = pairExposure * 1.2 + tripleExposure * 2.8 + riskyNums.length * 1.45 + pairHits.length * 2.7 + tripleHits.length * 4.8 + Math.max(0, hotCount - 2) * 1.15 + Math.max(0, coldCount - 2) * 0.8 + Math.max(0, tailFocus - 2) * 1.4 + Math.max(0, decadeFocus - 2) * 1.1 + adjacency * 1.1 + balanceGap * 0.9 + fingerprintBucket * 0.18 - Math.min(2, trendUpCount) * 0.8;
      let structureType = '均衡控風';
      if(tripleHits.length || tripleExposure >= 2) structureType = '三碰撞暴露';
      else if(pairHits.length || pairExposure >= 8) structureType = '雙碰撞偏高';
      else if(tailFocus >= 3 || decadeFocus >= 3) structureType = '區段過度集中';
      else if(hotCount >= 3) structureType = '熱號集中';
      else if(coldCount >= 3 && trendUpCount === 0) structureType = '冷號保守';
      else if(trendUpCount >= 2 && hotCount <= 2) structureType = '轉熱承接';
      else if(riskyNums.length >= 3) structureType = '高風險號堆疊';
      const lineText = `第${detail.groupIndex}組【${structureType}】${detail.groupNumbers.join(' ')}｜熱/溫/中/冷 ${hotCount}/${warmCount}/${midCount}/${coldCount}｜轉熱 ${trendUpCount}｜雙連號 ${pairHits.length ? pairHits.join('、') : '無'}｜三連號 ${tripleHits.length ? tripleHits.join('、') : '無'}｜風險號 ${riskyNums.length ? riskyNums.join('、') : '無'}｜雙暴露 ${pairExposure}｜三暴露 ${tripleExposure}｜尾數集中 ${tailFocus}｜十位集中 ${decadeFocus}｜分數 ${riskScore.toFixed(1)}`;
      return {
        detail,
        idx,
        pairExposure,
        tripleExposure,
        riskyNums,
        pairHits,
        tripleHits,
        hotCount,
        warmCount,
        midCount,
        coldCount,
        trendUpCount,
        trendDownCount,
        fingerprint,
        heatScore,
        trendScore,
        tailFocus,
        decadeFocus,
        adjacency,
        oddCount,
        spanValue,
        fingerprintBucket,
        balanceGap,
        riskScore,
        structureType,
        lineText
      };
    });

    const totalPairExposure = metrics.reduce((sum, item)=>sum + item.pairExposure, 0);
    const totalTripleExposure = metrics.reduce((sum, item)=>sum + item.tripleExposure, 0);
    const totalPairHits = metrics.reduce((sum, item)=>sum + item.pairHits.length, 0);
    const totalTripleHits = metrics.reduce((sum, item)=>sum + item.tripleHits.length, 0);
    const riskyGroupCount = metrics.filter((item)=>item.riskScore >= 9).length;
    const hotCounts = metrics.map((item)=>item.hotCount);
    const hotSpread = hotCounts.length ? Math.max(...hotCounts) - Math.min(...hotCounts) : 0;
    const fingerprintSpread = metrics.length ? Math.max(...metrics.map((item)=>item.fingerprintBucket)) - Math.min(...metrics.map((item)=>item.fingerprintBucket)) : 0;
    const scoreSpread = metrics.length ? Math.max(...metrics.map((item)=>item.riskScore)) - Math.min(...metrics.map((item)=>item.riskScore)) : 0;
    const stableGroupCount = metrics.filter((item)=>item.pairHits.length === 0 && item.tripleHits.length === 0 && item.riskScore < 8.5).length;
    const riskyNumberCoverage = metrics.reduce((sum, item)=>sum + item.riskyNums.length, 0);
    const heatAverage = metrics.length ? metrics.reduce((sum, item)=>sum + item.heatScore, 0) / metrics.length : 0;
    const trendAverage = metrics.length ? metrics.reduce((sum, item)=>sum + item.trendScore, 0) / metrics.length : 0;
    const drawCount = Number(analysis.evaluatedWindow || analysis.drawCount || 0);
    const windowFactor = Math.min(drawCount, 100) / 100;
    const fullSize = Number(row?.groups?.full?.length || 0);
    const safest = metrics.slice().sort((a,b)=>a.riskScore - b.riskScore || a.heatScore - b.heatScore || a.idx - b.idx)[0];
    const riskiest = metrics.slice().sort((a,b)=>b.riskScore - a.riskScore || b.heatScore - a.heatScore || a.idx - b.idx)[0];
    const midRisk = metrics.slice().sort((a,b)=>b.riskScore - a.riskScore || b.hotCount - a.hotCount)[1];

    let profile = '平衡型';
    if(totalTripleHits >= 1 || totalTripleExposure >= 20) profile = '三碰撞警戒型';
    else if(totalPairHits >= 2 || totalPairExposure >= 36) profile = '雙碰撞偏高型';
    else if(hotSpread >= 3 || metrics.some((item)=>item.hotCount >= 4)) profile = '熱號偏斜型';
    else if(stableGroupCount >= 3 && riskyNumberCoverage <= 5) profile = '均衡穩定型';
    else if(heatAverage < 28 && riskyNumberCoverage <= 4) profile = '冷號保守型';
    else if(trendAverage >= 6) profile = '轉熱承接型';

    const baseRisk = totalTripleHits * 10 + totalPairHits * 4.5 + totalTripleExposure * 1.4 + totalPairExposure * 0.9 + riskyGroupCount * 5.2 + hotSpread * 2.2 + Math.max(0, riskyNumberCoverage - 5) * 1.3;
    const stabilityBonus = stableGroupCount * 5.5 + Math.max(0, 2 - hotSpread) * 1.4 + (fullSize === 19 ? 2.5 : 0);
    const passTendency = clampNum(90 - baseRisk + stabilityBonus + windowFactor * 5 - Math.max(0, scoreSpread - 5) * 0.6 + (safest ? Math.max(0, 5 - safest.riskScore) * 1.1 : 0), 18, 96);
    const reliability = clampNum(38 + windowFactor * 28 + stableGroupCount * 6.5 + fingerprintSpread * 1.8 + Math.min(scoreSpread, 12) * 1.25 - totalTripleHits * 5.5 - totalPairHits * 2.2 - Math.max(0, riskyNumberCoverage - 6) * 1.4, 26, 92);

    let riskLevel = '低';
    if(baseRisk >= 34 || totalTripleHits >= 1 || totalTripleExposure >= 20 || (riskiest && riskiest.riskScore >= 14)) riskLevel = '高';
    else if(baseRisk >= 18 || totalPairHits >= 1 || totalPairExposure >= 24 || hotSpread >= 2 || (riskiest && riskiest.riskScore >= 9.5)) riskLevel = '中';
    riskLevel = `${riskLevel}｜${profile}`;

    const bestReasons = [];
    const worstReasons = [];
    if(safest){
      if(safest.tripleHits.length === 0 && safest.pairHits.length === 0) bestReasons.push('未撞高風險雙/三碰');
      if(safest.hotCount <= 2) bestReasons.push(`熱號控制 ${safest.hotCount} 顆`);
      if(safest.trendUpCount >= 1) bestReasons.push(`帶轉熱 ${safest.trendUpCount} 顆`);
      if(safest.tailFocus <= 2 && safest.decadeFocus <= 2) bestReasons.push('尾數與十位分散');
      if(!bestReasons.length) bestReasons.push(`暴露值 ${safest.riskScore.toFixed(1)}`);
    }
    if(riskiest){
      if(riskiest.tripleHits.length) worstReasons.push(`含三碰撞 ${String(riskiest.tripleHits[0]).replaceAll('-', '、')}`);
      if(!worstReasons.length && riskiest.pairHits.length) worstReasons.push(`含雙碰撞 ${String(riskiest.pairHits[0]).replaceAll('-', '、')}`);
      if(riskiest.tailFocus >= 3) worstReasons.push(`尾數集中 ${riskiest.tailFocus}`);
      if(riskiest.decadeFocus >= 3) worstReasons.push(`十位區集中 ${riskiest.decadeFocus}`);
      if(riskiest.riskyNums.length >= 2) worstReasons.push(`風險號 ${riskiest.riskyNums.slice(0,3).join('、')}`);
      if(!worstReasons.length) worstReasons.push(`暴露值 ${riskiest.riskScore.toFixed(1)}`);
    }

    let structureSummary = `四組熱/溫/中/冷：${metrics.map((item)=>`${item.hotCount}/${item.warmCount}/${item.midCount}/${item.coldCount}`).join('｜')}`;
    if(profile === '均衡穩定型') structureSummary += '，大多數組別沒有撞到高風險雙/三碰。';
    else if(profile === '熱號偏斜型') structureSummary += `，熱號落差 ${hotSpread}，熱區偏向少數組別。`;
    else if(profile === '冷號保守型') structureSummary += '，冷號比例高，進攻性偏弱。';
    else if(profile === '轉熱承接型') structureSummary += '，有帶近期升溫號，不是單純亂抽。';

    let actionAdvice = '建議維持目前四組與全車配置，可直接觀察開獎。';
    if(riskLevel.startsWith('高')) actionAdvice = `建議優先替換第${riskiest?.detail?.groupIndex || '?'}組，再重新生成一次較安全。`;
    else if(riskLevel.startsWith('中')) actionAdvice = `建議保留第${safest?.detail?.groupIndex || '?'}組，並檢查第${riskiest?.detail?.groupIndex || '?'}組是否要換號。`;
    else if(profile === '冷號保守型') actionAdvice = '整體偏保守，可直接追蹤；若要提高進攻性，可補 1 碼轉熱號。';
    else if(profile === '轉熱承接型') actionAdvice = '這套不是純隨機，已帶近期升溫號；可直接追或只微調高風險組。';

    const positives = [];
    const negatives = [];
    positives.push(`分析窗近 ${drawCount} 期，已同步熱號/雙連號/三連號/轉熱分布`);
    if(safest) positives.push(`最佳組是第${safest.detail.groupIndex}組：${bestReasons.slice(0,4).join('、')}`);
    if(stableGroupCount >= 2) positives.push(`低風險組共有 ${stableGroupCount} 組`);
    positives.push(structureSummary);
    if(riskiest) negatives.push(`優先留意第${riskiest.detail.groupIndex}組：${worstReasons.slice(0,4).join('、')}`);
    if(midRisk && riskiest && midRisk.detail.groupIndex !== riskiest.detail.groupIndex && midRisk.riskScore >= 8.5) negatives.push(`次風險組第${midRisk.detail.groupIndex}組也偏高（${midRisk.structureType}）`);
    negatives.push(`總雙號暴露 ${totalPairExposure}、總三號暴露 ${totalTripleExposure}`);
    negatives.push(actionAdvice);

    return {
      trackingId: row?.id || apiRec?.trackingId || '',
      passTendency: Number(passTendency.toFixed(1)),
      reliability: Number(reliability.toFixed(1)),
      riskLevel,
      positives: Array.from(new Set(positives)).slice(0,4),
      negatives: Array.from(new Set(negatives)).slice(0,4),
      bestGroupText: safest ? `第${safest.detail.groupIndex}組較穩：${bestReasons.slice(0,3).join('、')}` : '',
      riskGroupText: riskiest ? `第${riskiest.detail.groupIndex}組風險最高：${worstReasons.slice(0,3).join('、')}` : '',
      structureSummary,
      actionAdvice,
      profile,
      groupLineTexts: metrics.map(item => item.lineText)
    };
  }

  async function submitManualTracking(id){
    const s = state.lotteries[id];
    const sourceName = ($(`${id}_manualSource`)?.value || '').trim();
    const group1 = parseManualGroupInput(($(`${id}_manualGroup1`)?.value || ''), s.cfg.maxNum);
    const group2 = parseManualGroupInput(($(`${id}_manualGroup2`)?.value || ''), s.cfg.maxNum);
    const group3 = parseManualGroupInput(($(`${id}_manualGroup3`)?.value || ''), s.cfg.maxNum);
    const group4 = parseManualGroupInput(($(`${id}_manualGroup4`)?.value || ''), s.cfg.maxNum);
    const full = parseManualGroupInput(($(`${id}_manualFull`)?.value || ''), s.cfg.maxNum);
    if(!sourceName){
      showMiniNotice(`${s.cfg.title}：請先輸入通報名稱`, 'warn');

    }
    const groups = [group1, group2, group3, group4];
    if(groups.some(g => g.length !== 5 || new Set(g).size !== 5)){
      showMiniNotice(`${s.cfg.title}：手動第一組到第四組都需輸入 5 顆不重複號碼`, 'warn');
      return;
    }
    const merged = groups.flat();
    if(new Set(merged).size !== merged.length){
      showMiniNotice(`${s.cfg.title}：手動第一組到第四組之間不可重複`, 'warn');
      return;
    }
    if(full.length !== 19 || new Set(full).size !== 19){
      showMiniNotice(`${s.cfg.title}：全車號碼需輸入 19 顆不重複號碼`, 'warn');
      return;
    }
    try{
      const normalizedGroups = { group1, group2, group3, group4, full };
      const result = await postJsonApi('/api/manual-tracking', {
        method: 'POST',

          lotteryType: id === 'ttl' ? 'ttl' : '539',

        if($(`${id}_${key}`)) $(`${id}_${key}`).value = '';

    }catch(err){
      showMiniNotice(`${s.cfg.title}：手動追蹤失敗：${err.message || '未知錯誤'}`, 'warn');
    }
  }

  
  function parseManualGroupInput(value, maxNum){

      .map(n => parseInt(n,10))
      .filter(n => Number.isInteger(n) && n >= 1 && n <= maxNum)
      .map(n => String(n).padStart(2,'0'));
  }



function pickRandom(list, used){
  const arr = list.filter(n => !used.has(n));
  if(!arr.length) return null;
  return arr[Math.floor(Math.random() * arr.length)];
}

function groupHasRisk(nextNum, group, highRiskPairs, highRiskTriples){
  const test = [...group, nextNum].sort((a,b)=>parseInt(a,10)-parseInt(b,10));
  for(const pair of getCombinations(test, 2)) if(highRiskPairs.has(comboKey(pair))) return true;
  for(const triple of getCombinations(test, 3)) if(highRiskTriples.has(comboKey(triple))) return true;
  return false;
}

function makeGroupFromPools(targetSize, pools, used, highRiskPairs, highRiskTriples, maxNum){
  const group = [];
  const fallback = Array.from({length:maxNum}, (_,i)=> String(i+1).padStart(2,'0'));
  for(const pool of pools){
    let guard = 0;
    while(group.length < targetSize && guard < 60){
      guard += 1;
      const pick = pickRandom(pool, used);
      if(!pick) break;
      if(groupHasRisk(pick, group, highRiskPairs, highRiskTriples)) continue;
      group.push(pick); used.add(pick); break;
    }
  }
  let guard = 0;
  while(group.length < targetSize && guard < 500){
    guard += 1;
    const pick = pickRandom(fallback, used);
    if(!pick) break;
    if(groupHasRisk(pick, group, highRiskPairs, highRiskTriples)) continue;
    group.push(pick); used.add(pick);
  }
  return group.sort((a,b)=>parseInt(a,10)-parseInt(b,10));
}


function getManualFieldLimits(fieldKey){
  if(fieldKey === 'manualFull') return { maxCount: 19, allowOverlap: false };
  if(/^manualGroup[1-4]$/.test(fieldKey)) return { maxCount: 5, allowOverlap: false };
  return { maxCount: 5, allowOverlap: false };
}

  const { maxCount } = getManualFieldLimits(fieldKey);
  const labelMap = {
    manualGroup1: '第一組', manualGroup2: '第二組', manualGroup3: '第三組', manualGroup4: '第四組', manualFull: '全車號碼'
  };
  $('manualPickerTitle').textContent = `${state.lotteries[id].cfg.title}｜${labelMap[fieldKey] || '號碼面板'}`;
  $('manualPickerSub').textContent = `點選 1-39 號碼後自動排序帶入；本欄最多 ${maxCount} 顆。`;
  const selections = collectManualSelections(id);
  const current = new Set(selections[fieldKey] || []);
  const usedByOthers = new Set();
  Object.entries(selections).forEach(([key, vals]) => {
    if(key === fieldKey) return;
    vals.forEach((n) => usedByOthers.add(n));
  });
  board.innerHTML = '';
  for(let i=1;i<=39;i++){
    const num = String(i).padStart(2,'0');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `manualPickerNum${current.has(num) ? ' active' : ''}`;
    btn.textContent = num;
    if(usedByOthers.has(num) && !current.has(num)){
      btn.disabled = true;
      btn.title = '此號碼已被其他組別或全車使用';
      btn.style.opacity = '.35';
      btn.style.cursor = 'not-allowed';
    }
    btn.addEventListener('click', () => {
      let next = parseManualGroupInput(input.value || '', 39);
      const set = new Set(next);
      if(set.has(num)) set.delete(num);
      else {
        if(usedByOthers.has(num)){
          showMiniNotice(`${state.lotteries[id].cfg.title}：${num} 已被其他組別使用`, 'warn');
          return;
        }
        if(set.size >= maxCount){
          showMiniNotice(`${state.lotteries[id].cfg.title}：此欄最多只能選 ${maxCount} 顆`, 'warn');
          return;
        }
        set.add(num);
      }
      next = Array.from(set).sort((a,b)=>parseInt(a,10)-parseInt(b,10));
      input.value = next.join(' ');
      persistAll();
      renderManualPickerBoard();
    });
    board.appendChild(btn);
  }
}
